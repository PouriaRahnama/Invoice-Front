<div class="login-wrapper d-flex align-items-center justify-content-center bg-light px-3">
  <!-- بدنه اصلی صفحه ورود -->
  <div class="row shadow-lg rounded-4 overflow-hidden bg-white login-card">
    
    <!-- سمت آبی: متن خوش‌آمدگویی (در سمت راست قرار گرفت) -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-primary text-white p-5 order-md-2">
      <div class="text-center">
        <h2 class="fw-bold mb-4">خوش آمدید!</h2>
        <p class="opacity-75">به خانواده بزرگ ما بپیوندید و از خدمات ویژه لذت ببرید.</p>
        <i class="bi bi-person-workspace mt-3" style="font-size: 5rem;"></i>
      </div>
    </div>

    <!-- سمت سفید: فرم ورود (در سمت چپ قرار گرفت) -->
    <div class="col-md-6 p-4 p-lg-5 d-flex flex-column justify-content-center order-md-1">
      <div class="text-center text-md-end">
         <h3 class="mb-4 fw-bold">ورود به حساب کاربری</h3>
      </div>
      
      <form>
        <div class="mb-3">
          <label class="form-label text-muted small">ایمیل یا نام کاربری</label>
          <input type="email" class="form-control form-control-lg bg-light border-0" placeholder="example@mail.com">
        </div>
        
        <div class="mb-4">
          <label class="form-label text-muted small">رمز عبور</label>
          <input type="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3 shadow-sm">ورود</button>
        
        <div class="text-center">
          <span class="text-muted small">حساب کاربری ندارید؟</span>
          <a routerLink="/register" class="text-primary text-decoration-none fw-bold small"> ثبت‌نام کنید</a>
        </div>
      </form>
    </div>

  </div>
</div>
